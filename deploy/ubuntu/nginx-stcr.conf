# This file is loaded inside the nginx http context.
# Replace stcr.example.com and certificate paths before enabling it.
limit_req_zone $binary_remote_addr zone=stcr_api:10m rate=20r/s;

server {
    listen 80;
    listen [::]:80;
    server_name stcr.example.com;
    server_tokens off;
    access_log /var/log/nginx/stcr.access.log;
    error_log /var/log/nginx/stcr.error.log warn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stcr.example.com;

    ssl_certificate /etc/letsencrypt/live/stcr.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stcr.example.com/privkey.pem;

    root /var/www/stcr;
    index index.html;
    client_max_body_size 64k;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    location = /runtime-config.json {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /stcr/api/ {
        limit_req zone=stcr_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:1880;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
